name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install headless-only dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "yt-dlp[default]>=2026.3.13" \
            "curl_cffi>=0.14.0,<0.14.9" \
            "mutagen>=1.47.0" \
            "httpx>=0.27.0" \
            "beautifulsoup4>=4.12.0" \
            "lxml>=5.2.0" \
            "ytmusicapi>=1.7.0" \
            "Pillow>=10.3.0" \
            "requests>=2.31.0" \
            "syncedlyrics>=0.4.0" \
            "python-dotenv>=1.0.1" \
            "certifi>=2025.1.1" \
            "pytest>=8.0" \
            "pytest-mock>=3.12"

      - name: Run offline tests
        run: |
          pytest tests/ -x -q \
            --ignore=tests/test_p0_gates.py \
            --tb=short
        env:
          PYTHONPATH: .
