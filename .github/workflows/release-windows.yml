name: Build Windows release

# Runs only on:
#   * Manual dispatch from the Actions tab.
#   * Tags matching v*.*.* (e.g. v1.0.0).
# It does NOT run on every push or PR, so dev cycles are not blocked
# by long PyInstaller + Playwright builds.
#
# On a tag push this workflow:
#   1. Installs all Python deps + Playwright Chromium (bundled into EXE)
#   2. Runs tests
#   3. Builds a one-folder EXE with PyInstaller (Playwright included)
#   4. Builds a Windows installer with Inno Setup
#   5. Creates a portable ZIP + SHA-256 checksums
#   6. Publishes a GitHub Release with the installer, ZIP and checksums attached.

on:
  workflow_dispatch:
    inputs:
      bundle_ffmpeg:
        description: "Bundle LGPL FFmpeg (must be staged in packaging/ffmpeg/ before triggering)"
        required: false
        default: "false"
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: PyInstaller + Inno Setup on windows-latest
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller pytest pytest-mock
          python -m pip install -r requirements.txt

      - name: Install Playwright & download Chromium
        shell: pwsh
        run: |
          python -m pip install playwright
          python -m playwright install chromium --with-deps

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $v = (& python -c "from version import __version__; print(__version__)").Trim()
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "App version: $v"

      - name: Run unit tests (with Qt offscreen)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -q --tb=line

      - name: Regenerate version_info.txt from version.py
        shell: pwsh
        run: |
          python packaging\generate_version_info.py

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean packaging\ytspot.spec

      - name: Verify EXE smoke
        shell: pwsh
        run: |
          # --version must work; the EXE prints to stdout and exits 0.
          & dist\ytspot\ytspot-cli.exe --version
          if ($LASTEXITCODE -ne 0) { throw "ytspot-cli.exe --version failed" }
          # Doctor exits 1 if FFmpeg / network checks fail on the runner —
          # that is expected (no bundled FFmpeg in CI by default).
          # We only require the EXE to start, not for every check to be green.
          & dist\ytspot\ytspot-cli.exe --doctor
          # Accept exit 0 (everything green) or 1 (some warnings). Anything
          # else means the EXE crashed.
          if ($LASTEXITCODE -gt 1) { throw "ytspot-cli.exe --doctor crashed (exit $LASTEXITCODE)" }
          exit 0

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' packaging\ytspot.iss

      - name: Create portable ZIP + checksums
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $zipName = "ytspot-$v-windows-portable.zip"
          $zipPath = "dist\$zipName"
          Compress-Archive -Path "dist\ytspot\*" -DestinationPath $zipPath -Force

          # SHA-256 for every dist/ytspot-* artefact (ZIP + installer).
          $hashes = @()
          foreach ($f in Get-ChildItem -Path dist -File -Filter 'ytspot-*') {
            $h = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            $hashes += "$h  $($f.Name)"
          }
          $hashes | Set-Content -Path 'dist\SHA256SUMS.txt' -Encoding utf8
          Get-Content 'dist\SHA256SUMS.txt'

      - name: Upload portable build (folder)
        uses: actions/upload-artifact@v4
        with:
          name: ytspot-${{ steps.ver.outputs.version }}-windows-folder
          path: dist/ytspot/
          if-no-files-found: error
          retention-days: 14

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ytspot-${{ steps.ver.outputs.version }}-windows-release
          path: |
            dist/ytspot-*-windows-portable.zip
            dist/ytspot-*-windows-setup.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 60

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ytspot-*-windows-setup.exe
            dist/ytspot-*-windows-portable.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
